<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudflare AI Assistant Agent</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1f2937;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 680px);
        background: #ffffff;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 20px 45px rgba(31, 41, 55, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
        line-height: 1.2;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        font-weight: 700;
      }

      textarea {
        min-height: 112px;
        resize: vertical;
        border: 1px solid #bac3d0;
        border-radius: 6px;
        padding: 12px;
        font: inherit;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 6px;
        background: #155eef;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 16px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      pre {
        min-height: 56px;
        margin: 20px 0 0;
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-word;
        background: #f0f3f8;
        border: 1px solid #d9dee7;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cloudflare AI Assistant Agent</h1>
      <p>Week 1 foundation: a Cloudflare Workers API with a simple chat test page.</p>

      <form id="chat-form">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Type a message to test /chat">hello</textarea>
        <button type="submit">Send</button>
      </form>

      <pre id="response" aria-live="polite">Response will appear here.</pre>
    </main>

    <script>
      const form = document.querySelector("#chat-form");
      const messageInput = document.querySelector("#message");
      const responseOutput = document.querySelector("#response");
      const button = form.querySelector("button");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        button.disabled = true;
        responseOutput.textContent = "Sending...";

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              message: messageInput.value
            })
          });

          const data = await response.json();
          responseOutput.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          responseOutput.textContent = "Request failed. Make sure the Worker is running locally.";
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
